<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>CI4-StarterPanel — Project Structure</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --muted: #7b8db0;
    --accent: #6366f1;
    --accent2: #818cf8;

    --c-controller: #38bdf8;
    --c-model:       #34d399;
    --c-view:        #f9a8d4;
    --c-filter:      #fbbf24;
    --c-migration:   #c084fc;
    --c-config:      #94a3b8;
    --c-helper:      #fb923c;
    --c-seed:        #a78bfa;
    --c-api:         #22d3ee;
    --c-public:      #4ade80;
    --c-folder:      #e2e8f0;
    --c-file:        #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .logo {
    background: linear-gradient(135deg, var(--accent), var(--c-controller));
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 8px;
    letter-spacing: .5px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-left: auto;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px 7px 34px;
    font-size: 13px;
    width: 220px;
    outline: none;
    transition: border-color .2s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--border); border-color: var(--accent); }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    opacity: 1;
    transition: opacity .15s;
  }

  .legend-item.hidden { opacity: .35; }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    flex: 1;
    min-width: 110px;
    text-align: center;
  }

  .stat-card .num {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  .tree-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 12px;
    overflow: auto;
  }

  ul.tree { list-style: none; padding-left: 0; }
  ul.tree ul { padding-left: 22px; }

  li.tree-item { margin: 1px 0; }

  .node {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .12s;
    white-space: nowrap;
    user-select: none;
  }

  .node:hover { background: var(--surface2); }

  .node.matched-node {
    background: rgba(99, 102, 241, .18);
    outline: 1px solid var(--accent);
  }

  .node.hidden-node { display: none; }

  .chevron {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    transition: transform .18s;
    color: var(--muted);
  }

  .chevron.open { transform: rotate(90deg); }
  .chevron-placeholder { width: 16px; flex-shrink: 0; }

  .icon { font-size: 15px; flex-shrink: 0; }

  .node-name {
    font-size: 13px;
    font-weight: 500;
  }

  .node-name.folder-name { color: var(--c-folder); font-weight: 600; }

  .badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 99px;
    font-weight: 600;
    margin-left: 4px;
    opacity: .85;
  }

  .count-badge {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    padding-right: 4px;
  }

  .children { display: block; }
  .children.collapsed { display: none; }

  .no-results {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 32px;
    display: none;
  }
</style>

let hiddenTypes = new Set();

// ─── Render Tree ───────────────────────────────────────────────────────────
function renderTree(nodes, parentEl, depth = 0) {
  nodes.forEach(node => {
    const li = document.createElement('li');
    li.className = 'tree-item';
    li.dataset.type = node.type;
    li.dataset.name = node.name.toLowerCase();

    const nodeDiv = document.createElement('div');
    nodeDiv.className = 'node';

    const hasChildren = node.children && node.children.length > 0;
    const isFolder = node.type === 'folder' || node.type === 'root';

    // Chevron
    if (hasChildren) {
      const ch = document.createElement('span');
      ch.className = 'chevron' + (depth < 2 ? ' open' : '');
      ch.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
      nodeDiv.appendChild(ch);
    } else {
      const ph = document.createElement('span');
      ph.className = 'chevron-placeholder';
      nodeDiv.appendChild(ph);
    }

    // Icon
    const iconSpan = document.createElement('span');
    iconSpan.className = 'icon';
    iconSpan.textContent = node.icon;
    nodeDiv.appendChild(iconSpan);

    // Name
    const nameSpan = document.createElement('span');
    nameSpan.className = 'node-name' + (isFolder ? ' folder-name' : '');
    nameSpan.style.color = !isFolder ? TYPE_COLORS[node.type] || 'var(--c-file)' : '';
    nameSpan.textContent = node.name;
    nodeDiv.appendChild(nameSpan);

    // Badge
    if (node.badge) {
      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = node.badge;
      b.style.background = TYPE_BG[node.type] || 'rgba(148,163,184,.15)';
      b.style.color = TYPE_COLORS[node.type] || 'var(--c-file)';
      nodeDiv.appendChild(b);
    }

    // Child count
    if (hasChildren) {
      const cc = document.createElement('span');
      cc.className = 'count-badge';
      cc.textContent = node.children.length + (node.children.length === 1 ? ' item' : ' items');
      nodeDiv.appendChild(cc);
    }

    li.appendChild(nodeDiv);

    // Children
    if (hasChildren) {
      const ul = document.createElement('ul');
      ul.className = 'tree children' + (depth < 2 ? '' : ' collapsed');
      renderTree(node.children, ul, depth + 1);
      li.appendChild(ul);

      nodeDiv.addEventListener('click', () => {
        const ch = nodeDiv.querySelector('.chevron');
        ch.classList.toggle('open');
        ul.classList.toggle('collapsed');
      });
    }

    parentEl.appendChild(li);
  });
}

// ─── Search ────────────────────────────────────────────────────────────────
let searchTimeout;
document.getElementById('search').addEventListener('input', function () {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(this.value.trim().toLowerCase()), 120);
});

function doSearch(query) {
  const allNodes = document.querySelectorAll('.node');
  const allLi = document.querySelectorAll('.tree-item');
  const allChildren = document.querySelectorAll('.children');

  if (!query) {
    allNodes.forEach(n => n.classList.remove('matched-node', 'hidden-node'));
    allLi.forEach(l => l.style.display = '');
    allChildren.forEach(c => {
      if (!c.closest('li').dataset.depth > 2) c.classList.remove('collapsed');
    });
    document.getElementById('noResults').style.display = 'none';
    applyTypeFilter();
    return;
  }

  // expand everything
  allChildren.forEach(c => c.classList.remove('collapsed'));

  let matched = 0;
  allLi.forEach(li => {
    const name = li.dataset.name || '';
    if (name.includes(query)) {
      li.style.display = '';
      li.querySelector('.node').classList.add('matched-node');
      li.querySelector('.node').classList.remove('hidden-node');
      matched++;
      // show all ancestors
      let parent = li.parentElement;
      while (parent && parent.id !== 'treeRoot') {
        if (parent.tagName === 'LI') parent.style.display = '';
        parent = parent.parentElement;
      }
    } else {
      li.style.display = 'none';
      li.querySelector('.node').classList.remove('matched-node');
    }
  });

  document.getElementById('noResults').style.display = matched === 0 ? 'block' : 'none';
}

// ─── Type Filter ───────────────────────────────────────────────────────────
function toggleType(type) {
  if (hiddenTypes.has(type)) {
    hiddenTypes.delete(type);
    document.querySelector(`[data-type="${type}"]`).classList.remove('hidden');
  } else {
    hiddenTypes.add(type);
    document.querySelector(`[data-type="${type}"]`).classList.add('hidden');
  }
  applyTypeFilter();
}

function applyTypeFilter() {
  document.querySelectorAll('.tree-item').forEach(li => {
    if (hiddenTypes.has(li.dataset.type)) {
      li.style.display = 'none';
    } else {
      li.style.display = '';
    }
  });
}

// ─── Expand / Collapse All ─────────────────────────────────────────────────
function expandAll() {
  document.querySelectorAll('.children').forEach(c => c.classList.remove('collapsed'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.children').forEach(c => c.classList.add('collapsed'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
}

// ─── Init ──────────────────────────────────────────────────────────────────
const root = document.getElementById('treeRoot');
renderTree(TREE, root, 0);
</script>
</body>
</html>
